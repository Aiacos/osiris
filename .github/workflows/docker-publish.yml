name: Build & publish image

# Builds the deployment image and publishes it to GHCR on every push to the
# `vasto` branch (this server's deployment branch). Watchtower on the server
# then auto-pulls the new `:latest`. Runnable manually via "Run workflow".
on:
  push:
    branches: [vasto]
    paths-ignore:
      - '**.md'
      - '*.diff'
      - '.env.template'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/aiacos/osiris:latest
            ghcr.io/aiacos/osiris:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
